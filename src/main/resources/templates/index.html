<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Biblioteca</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h1 class="mb-4 text-center">Biblioteca de Libros</h1>

      <!-- Botón para abrir modal -->
      <div class="text-end mb-3">
        <button
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#modalAgregar"
        >
          Agregar Libro
        </button>
      </div>

      <!-- Tabla de libros -->
      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>Título</th>
            <th>Autor</th>
            <th>Año</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="libro : ${libros}">
            <td th:text="${libro.titulo}"></td>
            <td th:text="${libro.autor}"></td>
            <td th:text="${libro.anioPublicacion}"></td>
            <td>
              <a
                th:href="@{/libros/editar/{id}(id=${libro.id})}"
                class="btn btn-warning btn-sm"
                >Editar</a
              >
              <a
                th:href="@{/libros/eliminar/{id}(id=${libro.id})}"
                class="btn btn-danger btn-sm"
                onclick="return confirm('¿Seguro que deseas eliminar este libro?')"
                >Eliminar</a
              >
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Modal -->
    <div
      class="modal fade"
      id="modalAgregar"
      tabindex="-1"
      aria-labelledby="modalAgregarLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalAgregarLabel">
              Agregar nuevo libro
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <form th:action="@{/libros}" method="post">
            <div class="modal-body">
              <div class="mb-3">
                <label for="titulo" class="form-label">Título</label>
                <input
                  type="text"
                  class="form-control"
                  id="titulo"
                  name="titulo"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="autor" class="form-label">Autor</label>
                <input
                  type="text"
                  class="form-control"
                  id="autor"
                  name="autor"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="anioPublicacion" class="form-label"
                  >Año de publicación</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="anioPublicacion"
                  name="anioPublicacion"
                  required
                />
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
              <button type="submit" class="btn btn-success">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
